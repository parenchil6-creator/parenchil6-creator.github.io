<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl 2D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;900&display=swap');

        :root {
            --primary: #FFCC00;
            --btn-blue: linear-gradient(180deg, #33CCFF 0%, #0066FF 100%);
            --btn-green: linear-gradient(180deg, #66FF33 0%, #009900 100%);
            --btn-red: linear-gradient(180deg, #FF6666 0%, #CC0000 100%);
            --btn-yellow: linear-gradient(180deg, #FFEB3B 0%, #F39C12 100%);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #111;
            font-family: 'Nunito', sans-serif;
            user-select: none; touch-action: none;
        }

        #gameCanvas {
            display: block; width: 100%; height: 100%;
        }

        /* UI Containers */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(20,20,40,0.8) 0%, rgba(0,0,0,0.95) 100%);
            z-index: 10; transition: opacity 0.3s;
        }
        .hidden { display: none !important; }

        /* Typography */
        h1.title {
            font-family: 'Lilita One', cursive; font-size: 80px; color: var(--primary);
            text-shadow: 0 8px 0 #CC5500, 0 12px 20px rgba(0,0,0,0.8);
            margin-bottom: 10px; letter-spacing: 3px; text-transform: uppercase;
        }
        
        .trophy-count {
            font-size: 36px; color: white; font-weight: 900;
            text-shadow: 2px 2px 0 #000; margin-bottom: 30px;
            display: flex; align-items: center; gap: 10px;
        }
        .trophy-icon { color: #FFD700; font-size: 40px; text-shadow: 0 0 10px #FFD700; }

        /* Char Selection */
        .char-select {
            display: flex; gap: 20px; margin-bottom: 30px;
        }
        .char-btn {
            background: #222; border: 4px solid #444; border-radius: 15px; padding: 15px;
            color: white; font-family: 'Lilita One'; font-size: 24px; cursor: pointer;
            transition: 0.2s; text-transform: uppercase;
        }
        .char-btn.selected { border-color: #66FF33; box-shadow: 0 0 20px #66FF33; transform: scale(1.1); }
        .char-btn:hover { border-color: #FFCC00; }

        /* Buttons */
        .btn {
            border: 4px solid #111; border-radius: 15px; padding: 15px 40px;
            font-size: 28px; font-weight: 900; color: white; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 8px 0 #111, 0 15px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s, box-shadow 0.1s; text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
            font-family: 'Lilita One', cursive; letter-spacing: 1px; margin: 10px;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #111, 0 5px 10px rgba(0,0,0,0.5); }
        .btn-play { background: var(--btn-yellow); border-color: #B9770E; box-shadow: 0 8px 0 #9C640C, 0 15px 20px rgba(0,0,0,0.5); }
        .btn-box { background: var(--btn-blue); border-color: #0044AA; box-shadow: 0 8px 0 #003388, 0 15px 20px rgba(0,0,0,0.5); }
        
        /* Game HUD */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }
        .hud-top { display: flex; justify-content: space-between; padding: 20px; }
        .brawlers-left {
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px;
            color: white; font-weight: bold; font-size: 24px; border: 3px solid #333;
        }
        .controls-hint {
            position: absolute; bottom: 20px; right: 20px; text-align: right;
            color: rgba(255,255,255,0.7); font-size: 18px; font-weight: bold;
        }
        .super-ready-text { color: #FFEB3B; font-size: 24px; text-shadow: 0 0 10px #FF9800; display: none; }

        /* End Screen */
        .end-card {
            background: #222; border: 5px solid #444; border-radius: 20px;
            padding: 40px; text-align: center; color: white; min-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .end-place { font-size: 60px; font-family: 'Lilita One'; margin-bottom: 10px; }
        .end-trophies { font-size: 40px; font-weight: bold; margin-bottom: 30px; }
        .win-text { color: #66FF33; text-shadow: 0 4px 0 #009900; }
        .lose-text { color: #FF6666; text-shadow: 0 4px 0 #CC0000; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- Внутрішньоігровий інтерфейс -->
    <div id="hud" class="hidden">
        <div class="hud-top">
            <div class="brawlers-left" id="aliveCount">Бійців: 10</div>
        </div>
        <div class="controls-hint">
            <div id="superHint" class="super-ready-text">УЛЬТА ГОТОВА! (ПКМ або Пробіл)</div>
            <div>ЛКМ - Атака</div>
        </div>
    </div>

    <!-- Головне Меню -->
    <div id="mainMenu" class="overlay">
        <h1 class="title">BRAWL 2D</h1>
        <div class="trophy-count"><span class="trophy-icon">🏆</span> <span id="menuTrophies">0</span></div>
        
        <div class="char-select">
            <button class="char-btn selected" data-char="Шеллі">Шеллі<br><span style="font-size:12px">Дробовик</span></button>
            <button class="char-btn" data-char="Кольт">Кольт<br><span style="font-size:12px">Далекобійник</span></button>
            <button class="char-btn" data-char="Булл">Булл<br><span style="font-size:12px">Танк</span></button>
        </div>

        <button class="btn btn-play" id="startBtn">ГРАТИ (Зіткнення)</button>
    </div>

    <!-- Екран завершення -->
    <div id="endScreen" class="overlay hidden">
        <div class="end-card">
            <div id="endPlace" class="end-place">Місце: 1</div>
            <div id="endTrophies" class="end-trophies">+10 🏆</div>
            <button class="btn btn-play" id="backToMenuBtn" style="width: 100%; box-sizing: border-box;">У МЕНЮ</button>
        </div>
    </div>

<script>
// ==========================================
// НАЛАШТУВАННЯ
// ==========================================
let trophies = parseInt(localStorage.getItem('brawl_trophies')) || 0;
document.getElementById('menuTrophies').innerText = trophies;
let selectedBrawler = 'Шеллі';

// Вибір персонажа
document.querySelectorAll('.char-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected'));
        e.currentTarget.classList.add('selected');
        selectedBrawler = e.currentTarget.getAttribute('data-char');
    });
});

function updateTrophies(amount) {
    trophies += amount;
    if (trophies < 0) trophies = 0;
    localStorage.setItem('brawl_trophies', trophies);
    document.getElementById('menuTrophies').innerText = trophies;
}

const ui = {
    menu: document.getElementById('mainMenu'),
    hud: document.getElementById('hud'),
    endScreen: document.getElementById('endScreen'),
    aliveCount: document.getElementById('aliveCount'),
    superHint: document.getElementById('superHint')
};

// ==========================================
// ДВИЖОК ТА ІНПУТ
// ==========================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height;

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}
window.addEventListener('resize', resize);
resize();

const keys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false, Space: false };
const mouse = { x: 0, y: 0, leftDown: false, rightDown: false };

window.addEventListener('keydown', (e) => { 
    if(keys.hasOwnProperty(e.code)) keys[e.code] = true; 
});
window.addEventListener('keyup', (e) => { 
    if(keys.hasOwnProperty(e.code)) keys[e.code] = false; 
});
window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', (e) => { 
    if(e.button === 0) mouse.leftDown = true; 
    if(e.button === 2) mouse.rightDown = true;
});
window.addEventListener('mouseup', (e) => { 
    if(e.button === 0) mouse.leftDown = false; 
    if(e.button === 2) mouse.rightDown = false;
});
// Вимикаємо контекстне меню для ульти на ПКМ
window.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('blur', () => {
    for (let k in keys) keys[k] = false;
    mouse.leftDown = false; mouse.rightDown = false;
});

// ==========================================
// СТАТИСТИКА БІЙЦІВ
// ==========================================
const BRAWLER_STATS = {
    'Шеллі': {
        color: '#9C27B0', hp: 3600, speed: 320, range: 600, reload: 1.5, damage: 300, 
        type: 'spread', ammo: 3, superChargeRate: 20
    },
    'Кольт': {
        color: '#2196F3', hp: 2800, speed: 300, range: 850, reload: 1.6, damage: 320, 
        type: 'burst', ammo: 3, superChargeRate: 15
    },
    'Булл': {
        color: '#424242', hp: 5000, speed: 350, range: 350, reload: 1.6, damage: 400, 
        type: 'tank', ammo: 3, superChargeRate: 25
    }
};

// ==========================================
// СТАН ГРИ
// ==========================================
let gameActive = false;
let lastTime = 0;
const mapSize = { width: 4000, height: 4000 };
let stormRadius = 3000;

let player;
let brawlers = [];
let projectiles = [];
let crates = [];
let powerCubes = [];
let particles = [];

const camera = {
    x: 0, y: 0, shakeTime: 0, shakePower: 0,
    update(targetX, targetY, dt) {
        this.x += (targetX - width / 2 - this.x) * 0.1;
        this.y += (targetY - height / 2 - this.y) * 0.1;
        if(mapSize.width > width) this.x = Math.max(0, Math.min(this.x, mapSize.width - width));
        if(mapSize.height > height) this.y = Math.max(0, Math.min(this.y, mapSize.height - height));
        
        if (this.shakeTime > 0) {
            this.x += (Math.random() - 0.5) * this.shakePower;
            this.y += (Math.random() - 0.5) * this.shakePower;
            this.shakeTime -= dt;
        }
    },
    shake(time, power) { this.shakeTime = time; this.shakePower = power; }
};

// ==========================================
// КЛАСИ
// ==========================================

class GameObject {
    constructor(x, y, radius) {
        this.x = x; this.y = y; this.radius = radius; this.isDead = false;
    }
}

class Brawler extends GameObject {
    constructor(x, y, isPlayer, brawlerName, id) {
        super(x, y, 35);
        this.id = id;
        this.isPlayer = isPlayer;
        this.brawlerName = brawlerName;
        const stats = BRAWLER_STATS[brawlerName];
        
        this.speed = stats.speed;
        this.baseHp = stats.hp;
        this.maxHp = this.baseHp;
        this.hp = this.maxHp;
        this.baseDamage = stats.damage;
        this.damage = this.baseDamage;
        this.range = stats.range;
        this.color = stats.color;
        
        this.angle = 0;
        this.cubes = 0;

        // Патрони та стрільба
        this.maxAmmo = stats.ammo;
        this.ammo = this.maxAmmo;
        this.reloadTime = stats.reload;
        this.reloadTimer = 0;
        this.attackCooldown = 0;
        
        // Механіка типу стрільби
        this.attackType = stats.type;
        this.burstQueue = 0;
        this.burstTimer = 0;
        this.burstAngle = 0;
        this.isSuperBurst = false;

        // Ульта (Super)
        this.superChargeRate = stats.superChargeRate;
        this.superCharge = 0; // 0 to 100
        this.isDashing = false;
        this.dashTimer = 0;

        // Спавн
        this.spawnTimer = 2.5; // Щит при спавні
        this.spawnZ = 500; // Падіння з неба
    }

    addCube() {
        this.cubes++;
        this.maxHp += 400;
        this.hp += 400;
        this.damage += this.baseDamage * 0.1;
    }

    addSuperCharge() {
        if (this.superCharge < 100) {
            this.superCharge = Math.min(100, this.superCharge + this.superChargeRate);
        }
    }

    update(dt) {
        // Анімація спавну
        if (this.spawnZ > 0) {
            this.spawnZ -= 1500 * dt;
            if (this.spawnZ < 0) this.spawnZ = 0;
        }
        if (this.spawnTimer > 0 && this.spawnZ <= 0) {
            this.spawnTimer -= dt;
        }

        // Перезарядка
        if (this.ammo < this.maxAmmo && this.burstQueue === 0) {
            this.reloadTimer += dt;
            if (this.reloadTimer >= this.reloadTime) {
                this.ammo++;
                this.reloadTimer = 0;
            }
        }
        if (this.attackCooldown > 0) this.attackCooldown -= dt;

        // Обробка черг (Кольт)
        if (this.burstQueue > 0) {
            this.burstTimer -= dt;
            if (this.burstTimer <= 0) {
                this.spawnProj(this.burstAngle, this.isSuperBurst ? this.damage*1.5 : this.damage, this.isSuperBurst);
                this.burstQueue--;
                this.burstTimer = 0.1;
                this.x -= Math.cos(this.burstAngle) * 5; // Віддача
                this.y -= Math.sin(this.burstAngle) * 5;
            }
        }

        // Обробка Ривка (Булл Ульта)
        if (this.isDashing) {
            this.dashTimer -= dt;
            this.x += Math.cos(this.angle) * 1200 * dt;
            this.y += Math.sin(this.angle) * 1200 * dt;
            createParticles(this.x, this.y, this.color, 2);

            // Руйнування стін/ящиків під час ривка
            crates.forEach(c => {
                if (Math.hypot(this.x - c.x, this.y - c.y) < this.radius + c.radius) c.hp = 0;
            });
            // Шкода ворогам
            brawlers.forEach(b => {
                if (b !== this && b.spawnTimer <= 0 && Math.hypot(this.x - b.x, this.y - b.y) < this.radius + b.radius + 10) {
                    b.hp -= this.damage * 2 * dt; // DOT шкода при проходженні крізь
                }
            });

            if (this.dashTimer <= 0) this.isDashing = false;
        }

        // Шкода від зони
        if (this.spawnTimer <= 0) {
            let distToCenter = Math.hypot(this.x - mapSize.width/2, this.y - mapSize.height/2);
            if (distToCenter > stormRadius) {
                this.hp -= 1000 * dt; // Отрута б'є сильніше
            }
        }
    }

    tryAttack(targetX, targetY, isSuper) {
        if (this.spawnZ > 0 || this.isDashing) return;
        
        if (isSuper) {
            if (this.superCharge >= 100) {
                this.superCharge = 0;
                this.executeAttack(targetX, targetY, true);
            }
        } else {
            if (this.ammo >= 1 && this.attackCooldown <= 0 && this.burstQueue === 0) {
                this.ammo--;
                this.attackCooldown = 0.3;
                // Зняття щита при атаці
                this.spawnTimer = 0; 
                this.executeAttack(targetX, targetY, false);
            }
        }
    }

    executeAttack(targetX, targetY, isSuper) {
        const dx = targetX - this.x;
        const dy = targetY - this.y;
        this.angle = Math.atan2(dy, dx);

        if (this.brawlerName === 'Шеллі') {
            let pellets = isSuper ? 5 : 3;
            let spread = isSuper ? 0.6 : 0.3;
            let dmg = isSuper ? this.damage * 1.5 : this.damage;
            if(isSuper && this.isPlayer) camera.shake(0.2, 10);

            for(let i=0; i<pellets; i++) {
                let pAngle = this.angle - spread/2 + (spread/(pellets-1)) * i;
                this.spawnProj(pAngle, dmg, isSuper);
            }
            this.x -= Math.cos(this.angle) * (isSuper ? 25 : 10);
        } 
        else if (this.brawlerName === 'Кольт') {
            this.burstQueue = isSuper ? 6 : 3;
            this.burstAngle = this.angle;
            this.isSuperBurst = isSuper;
            this.burstTimer = 0;
        }
        else if (this.brawlerName === 'Булл') {
            if (isSuper) {
                this.isDashing = true;
                this.dashTimer = 0.8;
                if(this.isPlayer) camera.shake(0.8, 5);
            } else {
                let pellets = 5;
                let spread = 0.5;
                for(let i=0; i<pellets; i++) {
                    let pAngle = this.angle - spread/2 + (spread/(pellets-1)) * i;
                    this.spawnProj(pAngle, this.damage, false);
                }
                this.x -= Math.cos(this.angle) * 15;
            }
        }
    }

    spawnProj(angle, dmg, isSuper) {
        let size = (this.brawlerName === 'Кольт' ? 10 : 8);
        if (isSuper) size *= 1.5;
        let range = this.range;
        if(isSuper && this.brawlerName === 'Шеллі') range *= 1.3;
        
        projectiles.push(new Projectile(this.x, this.y, angle, this, dmg, range, size, isSuper));
    }

    draw(ctx) {
        ctx.save();
        
        // Масштабування для падіння
        let scale = 1 + (this.spawnZ / 500);
        ctx.translate(this.x, this.y - this.spawnZ);
        ctx.scale(scale, scale);

        // Тінь
        if (this.spawnZ <= 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath(); ctx.ellipse(0, this.radius + 5, this.radius, this.radius * 0.5, 0, 0, Math.PI*2); ctx.fill();
        }

        ctx.rotate(this.angle);

        // Зброя
        ctx.fillStyle = '#333'; ctx.strokeStyle = '#111'; ctx.lineWidth = 4;
        if (this.brawlerName === 'Шеллі') {
            ctx.beginPath(); ctx.roundRect(15, -8, 45, 16, 4); ctx.fill(); ctx.stroke();
        } else if (this.brawlerName === 'Кольт') {
            ctx.beginPath(); ctx.roundRect(10, -18, 30, 10, 3); ctx.roundRect(10, 8, 30, 10, 3); ctx.fill(); ctx.stroke();
        } else { // Булл
            ctx.beginPath(); ctx.roundRect(10, -12, 40, 24, 6); ctx.fill(); ctx.stroke();
        }

        // Тіло
        ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2);
        ctx.fillStyle = this.color; ctx.fill(); ctx.stroke();

        // Очі
        ctx.fillStyle = '#111';
        if (this.brawlerName === 'Булл') {
            ctx.beginPath(); ctx.moveTo(5, -15); ctx.lineTo(15, -5); ctx.lineTo(15, 5); ctx.lineTo(5, 15); ctx.fill();
        } else {
            ctx.beginPath(); ctx.roundRect(5, -15, 20, 30, 8); ctx.fill();
            ctx.fillStyle = this.isPlayer ? '#FFF' : '#FFDD00';
            ctx.beginPath(); ctx.arc(15, -6, 4, 0, Math.PI*2); ctx.arc(15, 6, 4, 0, Math.PI*2); ctx.fill();
        }

        ctx.restore();

        // Щит невразливості
        if (this.spawnTimer > 0 && this.spawnZ <= 0) {
            ctx.save(); ctx.translate(this.x, this.y);
            ctx.strokeStyle = `rgba(0, 255, 255, ${Math.abs(Math.sin(Date.now()/100))})`;
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(0, 0, this.radius + 10, 0, Math.PI*2); ctx.stroke();
            ctx.restore();
        }

        // UI над гравцем
        if (this.spawnZ <= 0) this.drawUI(ctx);
    }

    drawUI(ctx) {
        const barW = 80; const barH = 12;
        const xOffset = this.x - barW / 2;
        const yOffset = this.y - this.radius - 40;

        // Ім'я та банки
        ctx.fillStyle = '#FFF'; ctx.font = 'bold 14px Nunito'; ctx.textAlign = 'center';
        ctx.fillText(this.isPlayer ? "Ти" : "Бот", this.x, yOffset - 15);

        if (this.cubes > 0) {
            ctx.fillStyle = '#66FF33'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(this.x - barW/2 - 25, yOffset - 4, 20, 20, 4); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#000'; ctx.font = 'bold 14px Nunito'; ctx.textBaseline = 'middle';
            ctx.fillText(this.cubes, this.x - barW/2 - 15, yOffset + 6);
        }

        // Здоров'я
        ctx.textBaseline = 'alphabetic';
        ctx.fillStyle = '#000'; ctx.fillRect(xOffset - 3, yOffset - 3, barW + 6, barH + 6);
        let hpPct = Math.max(0, this.hp / this.maxHp);
        ctx.fillStyle = this.isPlayer ? '#4CAF50' : '#F44336';
        ctx.fillRect(xOffset, yOffset, barW * hpPct, barH);
        
        ctx.fillStyle = '#FFF'; ctx.font = 'bold 10px sans-serif';
        ctx.fillText(`${Math.floor(this.hp)}`, this.x, yOffset + 10);

        // Патрони
        const ammoY = yOffset + barH + 4;
        const ammoW = (barW - (this.maxAmmo-1)*2) / this.maxAmmo;
        for(let i=0; i<this.maxAmmo; i++) {
            ctx.fillStyle = '#000'; ctx.fillRect(xOffset + i*(ammoW+2), ammoY, ammoW, 6);
            if (i < this.ammo) {
                ctx.fillStyle = '#FF9800';
                ctx.fillRect(xOffset + i*(ammoW+2) + 1, ammoY + 1, ammoW - 2, 4);
            } else if (i === this.ammo && this.burstQueue === 0) {
                let reloadPct = this.reloadTimer / this.reloadTime;
                ctx.fillStyle = '#FF9800';
                ctx.fillRect(xOffset + i*(ammoW+2) + 1, ammoY + 1, (ammoW - 2) * reloadPct, 4);
            }
        }

        // Ульта (Кружечок біля ХП)
        if (this.superCharge > 0) {
            ctx.beginPath(); ctx.arc(xOffset + barW + 15, yOffset + 6, 12, 0, Math.PI*2);
            ctx.fillStyle = '#222'; ctx.fill(); ctx.stroke();
            
            ctx.beginPath(); 
            ctx.moveTo(xOffset + barW + 15, yOffset + 6);
            ctx.arc(xOffset + barW + 15, yOffset + 6, 10, -Math.PI/2, -Math.PI/2 + (Math.PI*2 * (this.superCharge/100)));
            ctx.fillStyle = this.superCharge >= 100 ? '#FFEB3B' : '#03A9F4';
            ctx.fill();
        }
    }
}

class Projectile extends GameObject {
    constructor(x, y, angle, owner, damage, maxDist, size, isSuper) {
        super(x, y, size);
        this.angle = angle;
        this.speed = owner.brawlerName === 'Кольт' ? 1800 : 1400;
        this.owner = owner;
        this.damage = damage;
        this.maxDistance = maxDist;
        this.distance = 0;
        this.isSuper = isSuper;
        this.hitList = []; // Для пробивних ульт
        
        this.x += Math.cos(angle) * 45;
        this.y += Math.sin(angle) * 45;
    }

    update(dt) {
        let dx = Math.cos(this.angle) * this.speed * dt;
        let dy = Math.sin(this.angle) * this.speed * dt;
        this.x += dx; this.y += dy;
        this.distance += Math.sqrt(dx*dx + dy*dy);
        if (this.distance > this.maxDistance) this.isDead = true;
    }

    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
        ctx.fillStyle = this.isSuper ? '#FFEB3B' : (this.owner.isPlayer ? '#00FFFF' : '#FF5555');
        ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
        
        if (this.owner.brawlerName === 'Шеллі' || this.owner.brawlerName === 'Булл') {
            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.beginPath(); ctx.roundRect(-this.radius, -this.radius/2, this.radius*2, this.radius, 4); ctx.fill();
        }
        ctx.restore();
    }
}

class Crate extends GameObject {
    constructor(x, y) {
        super(x, y, 40);
        this.hp = 4000; this.maxHp = 4000;
    }
    
    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.fillStyle = '#8B4513'; ctx.fillRect(-35, -35, 70, 70);
        ctx.fillStyle = '#A0522D'; ctx.fillRect(-30, -30, 60, 60);
        
        ctx.strokeStyle = '#6B3410'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(-30, -30); ctx.lineTo(30, 30); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(30, -30); ctx.lineTo(-30, 30); ctx.stroke();

        if (this.hp < this.maxHp) {
            ctx.fillStyle = '#000'; ctx.fillRect(-30, -50, 60, 8);
            ctx.fillStyle = '#FFF'; ctx.fillRect(-28, -48, 56 * (this.hp/this.maxHp), 4);
        }
        ctx.restore();
    }
}

class PowerCube extends GameObject {
    constructor(x, y) {
        super(x, y, 12); // Менший радіус
        this.floatOffset = 0;
    }
    update(dt) { this.floatOffset += dt * 5; }
    draw(ctx) {
        let yOffset = Math.sin(this.floatOffset) * 5;
        ctx.save(); ctx.translate(this.x, this.y + yOffset);
        
        ctx.shadowBlur = 10; ctx.shadowColor = '#66FF33';
        ctx.fillStyle = '#66FF33'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(-12, -12, 24, 24, 4); ctx.fill(); ctx.stroke();
        
        ctx.shadowBlur = 0; ctx.fillStyle = '#FFF';
        ctx.fillRect(-2, -6, 4, 12); ctx.fillRect(-6, -2, 12, 4);
        ctx.restore();
    }
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*200, vy: (Math.random()-0.5)*200,
            life: 0.5, color: color
        });
    }
}

// ==========================================
// ФІЗИКА ТА ЛОГІКА
// ==========================================

function checkCollision(objA, objB) {
    // Якщо Булл в ривку - він руйнує ящики, а не стикається
    if (objA.isDashing && objB instanceof Crate) return;
    if (objB.isDashing && objA instanceof Crate) return;

    let dx = objA.x - objB.x;
    let dy = objA.y - objB.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < objA.radius + objB.radius) {
        let overlap = (objA.radius + objB.radius) - dist;
        if(dist === 0) { objA.x += overlap; return; }
        
        // Маса ящиків більша (вони не рухаються)
        if (objA instanceof Crate) {
            objB.x -= (dx/dist) * overlap; objB.y -= (dy/dist) * overlap;
        } else if (objB instanceof Crate) {
            objA.x += (dx/dist) * overlap; objA.y += (dy/dist) * overlap;
        } else {
            objA.x += (dx/dist) * (overlap/2); objA.y += (dy/dist) * (overlap/2);
            objB.x -= (dx/dist) * (overlap/2); objB.y -= (dy/dist) * (overlap/2);
        }
    }
}

// ==========================================
// ГОЛОВНИЙ ЦИКЛ ГРИ
// ==========================================

function initMatch() {
    brawlers = []; projectiles = []; crates = []; powerCubes = []; particles = [];
    stormRadius = mapSize.width * 0.7;

    const brawlerNames = ['Шеллі', 'Кольт', 'Булл'];

    // Спавн Гравця
    player = new Brawler(Math.random() * (mapSize.width-400)+200, Math.random() * (mapSize.height-400)+200, true, selectedBrawler, 0);
    brawlers.push(player);

    // Спавн 9 Ботів
    for(let i=1; i<=9; i++) {
        let randBrawler = brawlerNames[Math.floor(Math.random() * brawlerNames.length)];
        brawlers.push(new Brawler(Math.random() * (mapSize.width-400)+200, Math.random() * (mapSize.height-400)+200, false, randBrawler, i));
    }

    // Спавн Ящиків
    for(let i=0; i<45; i++) {
        crates.push(new Crate(Math.random() * (mapSize.width-300)+150, Math.random() * (mapSize.height-300)+150));
    }

    gameActive = true;
    ui.menu.classList.add('hidden');
    ui.endScreen.classList.add('hidden');
    ui.hud.classList.remove('hidden');
    
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

function finishMatch() {
    gameActive = false;
    let place = brawlers.length; 
    if (player.hp > 0) place = 1;

    const trophyChanges = [10, 8, 6, 4, 2, 0, -1, -2, -3, -5];
    let earned = trophyChanges[place - 1] || 0;
    
    updateTrophies(earned);

    ui.hud.classList.add('hidden');
    ui.endScreen.classList.remove('hidden');
    document.getElementById('endPlace').innerText = `Місце: ${place}`;
    document.getElementById('endPlace').className = place <= 4 ? 'end-place win-text' : 'end-place lose-text';
    document.getElementById('endTrophies').innerText = earned >= 0 ? `+${earned} 🏆` : `${earned} 🏆`;
    document.getElementById('endTrophies').style.color = earned >= 0 ? '#66FF33' : '#FF6666';
}

function update(dt) {
    if(!gameActive) return;

    stormRadius -= 15 * dt; 

    // --- РУХ ГРАВЦЯ ---
    if (player.hp > 0 && !player.isDashing && player.spawnZ <= 0) {
        let dx = 0, dy = 0;
        if (keys.KeyW || keys.ArrowUp) dy -= 1;
        if (keys.KeyS || keys.ArrowDown) dy += 1;
        if (keys.KeyA || keys.ArrowLeft) dx -= 1;
        if (keys.KeyD || keys.ArrowRight) dx += 1;

        if (dx !== 0 || dy !== 0) {
            let len = Math.sqrt(dx*dx + dy*dy);
            player.x += (dx/len) * player.speed * dt;
            player.y += (dy/len) * player.speed * dt;
        }

        let mwX = mouse.x + camera.x;
        let mwY = mouse.y + camera.y;
        
        // Звичайна атака
        if (mouse.leftDown) player.tryAttack(mwX, mwY, false);
        // Ульта
        if (mouse.rightDown || keys.Space) player.tryAttack(mwX, mwY, true);
    }

    // UI Ульти
    if(player.superCharge >= 100) ui.superHint.style.display = 'block';
    else ui.superHint.style.display = 'none';

    // --- БОТИ (AI) ---
    brawlers.forEach(b => {
        b.update(dt);
        if (b.isPlayer || b.spawnZ > 0) return;

        let target = null; let minDist = Infinity;
        let possibleTargets = [...brawlers.filter(ob => ob !== b && ob.spawnTimer <= 0), ...crates];
        
        possibleTargets.forEach(t => {
            let dist = Math.hypot(t.x - b.x, t.y - b.y);
            if (dist < minDist) { minDist = dist; target = t; }
        });

        if (target && !b.isDashing) {
            let angleToTarget = Math.atan2(target.y - b.y, target.x - b.x);
            // Плавний поворот (спрощено)
            b.angle = angleToTarget; 
            
            let optimalDist = b.range * 0.7; // Триматись на 70% дистанції атаки
            if (minDist > optimalDist) {
                b.x += Math.cos(b.angle) * b.speed * dt;
                b.y += Math.sin(b.angle) * b.speed * dt;
            } else if (minDist < optimalDist - 100) {
                // Відступ
                b.x -= Math.cos(b.angle) * b.speed * dt;
                b.y -= Math.sin(b.angle) * b.speed * dt;
            }

            // Атака
            if (minDist <= b.range) {
                if (b.superCharge >= 100 && minDist < b.range * 0.8) {
                    b.tryAttack(target.x, target.y, true);
                } else {
                    b.tryAttack(target.x, target.y, false);
                }
            }
        }

        // Втеча від зони
        let distToCenter = Math.hypot(b.x - mapSize.width/2, b.y - mapSize.height/2);
        if (distToCenter > Math.max(0, stormRadius - 300)) {
            let angleToCenter = Math.atan2(mapSize.height/2 - b.y, mapSize.width/2 - b.x);
            b.x += Math.cos(angleToCenter) * b.speed * dt;
            b.y += Math.sin(angleToCenter) * b.speed * dt;
        }
    });

    // --- СНАРЯДИ ---
    for(let i = projectiles.length-1; i>=0; i--) {
        let p = projectiles[i];
        p.update(dt);
        if(p.isDead) continue;

        let hitSomething = false;

        // Влучання в бійців
        brawlers.forEach(b => {
            if (p.owner !== b && !p.isDead && b.spawnTimer <= 0 && b.spawnZ <= 0) {
                if (Math.hypot(p.x - b.x, p.y - b.y) < b.radius + p.radius) {
                    if (!p.hitList.includes(b)) {
                        b.hp -= p.damage;
                        createParticles(p.x, p.y, b.color, 3);
                        if(p.owner) p.owner.addSuperCharge();
                        p.hitList.push(b);
                        hitSomething = true;
                    }
                }
            }
        });

        // Влучання в ящики
        crates.forEach(c => {
            if (!p.isDead && Math.hypot(p.x - c.x, p.y - c.y) < c.radius + p.radius) {
                 if (!p.hitList.includes(c)) {
                    c.hp -= p.damage;
                    createParticles(p.x, p.y, '#8B4513', 3);
                    if(p.owner) p.owner.addSuperCharge();
                    p.hitList.push(c);
                    hitSomething = true;
                 }
            }
        });

        // Видалити снаряд, якщо він не пробивний
        if (hitSomething && !p.isSuper) p.isDead = true;
    }

    // --- ЗБІР БАНОК ---
    brawlers.forEach(b => {
        if(b.spawnZ > 0) return;
        powerCubes.forEach(pc => {
            if (!pc.isDead && Math.hypot(b.x - pc.x, b.y - pc.y) < b.radius + pc.radius + 10) {
                b.addCube();
                pc.isDead = true;
                // Звуковий ефект або партикли
                createParticles(pc.x, pc.y, '#66FF33', 5);
            }
        });
    });

    powerCubes.forEach(pc => pc.update(dt));
    
    // Частинки
    for(let i=particles.length-1; i>=0; i--) {
        let pt = particles[i];
        pt.x += pt.vx * dt; pt.y += pt.vy * dt;
        pt.life -= dt;
        if(pt.life <= 0) particles.splice(i, 1);
    }

    // --- КОЛІЗІЇ ---
    let collidables = [...brawlers.filter(b=>b.spawnZ<=0), ...crates];
    for(let i=0; i<collidables.length; i++) {
        for(let j=i+1; j<collidables.length; j++) {
            checkCollision(collidables[i], collidables[j]);
        }
    }

    // Межі карти
    brawlers.forEach(b => {
        b.x = Math.max(b.radius, Math.min(b.x, mapSize.width - b.radius));
        b.y = Math.max(b.radius, Math.min(b.y, mapSize.height - b.radius));
    });

    // --- ОЧИЩЕННЯ ВБИТИХ ---
    crates.forEach(c => {
        if(c.hp <= 0 && !c.isDead) {
            c.isDead = true;
            powerCubes.push(new PowerCube(c.x, c.y));
            createParticles(c.x, c.y, '#8B4513', 10);
        }
    });

    brawlers.forEach(b => {
        if(b.hp <= 0 && !b.isDead) {
            b.isDead = true;
            // Випадає стільки банок, скільки було / 2 + 1
            let cubesToDrop = Math.floor(b.cubes / 2) + 1;
            for(let i=0; i<cubesToDrop; i++) {
                let offsetX = (Math.random()-0.5)*40;
                let offsetY = (Math.random()-0.5)*40;
                powerCubes.push(new PowerCube(b.x + offsetX, b.y + offsetY));
            }
            if(b.isPlayer) finishMatch();
        }
    });

    projectiles = projectiles.filter(p => !p.isDead);
    crates = crates.filter(c => !c.isDead);
    powerCubes = powerCubes.filter(pc => !pc.isDead);
    brawlers = brawlers.filter(b => !b.isDead);

    ui.aliveCount.innerText = `Бійців: ${brawlers.length}`;

    // Перемога гравця
    if (player.hp > 0 && brawlers.length === 1 && !player.isDead) {
        finishMatch();
    }

    if (player.hp > 0) camera.update(player.x, player.y, dt);
}

// ==========================================
// РЕНДЕР
// ==========================================

function drawBackground(ctx) {
    ctx.fillStyle = '#A0C050'; 
    ctx.fillRect(0, 0, mapSize.width, mapSize.height);

    ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 4;
    for(let x=0; x<mapSize.width; x+=200) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,mapSize.height); ctx.stroke(); }
    for(let y=0; y<mapSize.height; y+=200) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(mapSize.width,y); ctx.stroke(); }

    ctx.strokeStyle = '#444'; ctx.lineWidth = 20;
    ctx.strokeRect(0, 0, mapSize.width, mapSize.height);
}

function drawStorm(ctx) {
    ctx.fillStyle = 'rgba(0, 200, 0, 0.4)';
    ctx.beginPath();
    ctx.rect(0, 0, mapSize.width, mapSize.height);
    ctx.arc(mapSize.width/2, mapSize.height/2, Math.max(0, stormRadius), 0, Math.PI*2, true);
    ctx.fill();

    ctx.strokeStyle = '#00FF00'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(mapSize.width/2, mapSize.height/2, Math.max(0, stormRadius), 0, Math.PI*2); ctx.stroke();
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    drawBackground(ctx);
    drawStorm(ctx);

    let renderables = [...crates, ...powerCubes, ...brawlers].sort((a,b) => a.y - b.y);
    renderables.forEach(r => r.draw(ctx));
    projectiles.forEach(p => p.draw(ctx));

    // Частинки
    particles.forEach(pt => {
        ctx.fillStyle = pt.color;
        ctx.globalAlpha = pt.life * 2;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, 4, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    ctx.restore();
}

function gameLoop(timestamp) {
    let dt = (timestamp - lastTime) / 1000;
    if (dt > 0.1) dt = 0.1;
    lastTime = timestamp;

    update(dt);
    draw();

    if(gameActive) requestAnimationFrame(gameLoop);
}

// ==========================================
// ПОДІЇ КНОПОК
// ==========================================
document.getElementById('startBtn').addEventListener('click', initMatch);
document.getElementById('backToMenuBtn').addEventListener('click', () => {
    ui.endScreen.classList.add('hidden');
    ui.menu.classList.remove('hidden');
});

</script>
