<!DOCTYPE html>
<html lang="uk" data-theme="standard">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Головоломка | Block Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --board-size: 80vw;
            --max-board-size: 400px;
        }

        /* --- ТЕМИ ОФОРМЛЕННЯ --- */
        /* 1. Стандартна (Glassmorphism) */
        [data-theme="standard"] {
            --bg-body: linear-gradient(135deg, #0f172a, #1e1b4b);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --header-bg: transparent;
            --board-bg: rgba(255, 255, 255, 0.05);
            --board-border: rgba(255, 255, 255, 0.1);
            --cell-bg: rgba(255, 255, 255, 0.03);
            --cell-border: rgba(255, 255, 255, 0.05);
            --dock-bg: rgba(15, 23, 42, 0.6);
            --btn-bg: rgba(30, 41, 59, 0.5);
            --btn-hover: rgba(51, 65, 85, 0.5);
            --modal-bg: rgba(30, 41, 59, 0.95);
            --modal-overlay: rgba(15, 23, 42, 0.8);
            
            --color-0: linear-gradient(135deg, #f43f5e, #e11d48);
            --color-1: linear-gradient(135deg, #3b82f6, #2563eb);
            --color-2: linear-gradient(135deg, #10b981, #059669);
            --color-3: linear-gradient(135deg, #f59e0b, #d97706);
            --color-4: linear-gradient(135deg, #8b5cf6, #7c3aed);
            --color-5: linear-gradient(135deg, #06b6d4, #0891b2);
            --color-6: linear-gradient(135deg, #ec4899, #db2777);
            
            --piece-shadow: inset 0 0 10px rgba(255,255,255,0.2);
            --piece-border: 1px solid rgba(255,255,255,0.3);
            --title-color: transparent;
            --title-bg: linear-gradient(to right, #22d3ee, #c084fc);
        }

        /* 2. Світла мінімалістична */
        [data-theme="light"] {
            --bg-body: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --header-bg: #ffffff;
            --board-bg: #ffffff;
            --board-border: #e5e7eb;
            --cell-bg: #f9fafb;
            --cell-border: #e5e7eb;
            --dock-bg: #ffffff;
            --btn-bg: #f3f4f6;
            --btn-hover: #e5e7eb;
            --modal-bg: #ffffff;
            --modal-overlay: rgba(0, 0, 0, 0.5);

            --color-0: #ef4444;
            --color-1: #3b82f6;
            --color-2: #10b981;
            --color-3: #f59e0b;
            --color-4: #8b5cf6;
            --color-5: #06b6d4;
            --color-6: #ec4899;

            --piece-shadow: none;
            --piece-border: 2px solid rgba(0,0,0,0.1);
            --title-color: #111827;
            --title-bg: none;
        }

        /* 3. Темна мінімалістична */
        [data-theme="dark"] {
            --bg-body: #111827;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --header-bg: #1f2937;
            --board-bg: #1f2937;
            --board-border: #374151;
            --cell-bg: #111827;
            --cell-border: #374151;
            --dock-bg: #1f2937;
            --btn-bg: #374151;
            --btn-hover: #4b5563;
            --modal-bg: #1f2937;
            --modal-overlay: rgba(0, 0, 0, 0.8);

            --color-0: #f87171;
            --color-1: #60a5fa;
            --color-2: #34d399;
            --color-3: #fbbf24;
            --color-4: #a78bfa;
            --color-5: #22d3ee;
            --color-6: #f472b6;

            --piece-shadow: none;
            --piece-border: 2px solid rgba(255,255,255,0.1);
            --title-color: #f9fafb;
            --title-bg: none;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            overflow: hidden;
            touch-action: none;
            transition: background 0.3s, color 0.3s;
        }

        /* Базові UI компоненти */
        .btn-ui {
            background: var(--btn-bg);
            color: var(--text-main);
            transition: background 0.2s;
        }
        .btn-ui:hover { background: var(--btn-hover); }
        .text-muted { color: var(--text-muted); }

        /* Стилі ігрового поля */
        #board-container {
            width: min(var(--board-size), var(--max-board-size));
            height: min(var(--board-size), var(--max-board-size));
            position: relative;
            background: var(--board-bg);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            border: 1px solid var(--board-border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            margin: 0 auto;
            transition: all 0.3s;
        }

        .board-grid {
            display: grid;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            gap: 2px;
            padding: 4px;
            box-sizing: border-box;
        }

        .board-cell {
            background: var(--cell-bg);
            border-radius: 4px;
            border: 1px solid var(--cell-border);
            transition: background 0.2s;
        }

        /* Стилі фігур */
        .piece {
            display: grid;
            gap: 2px;
            cursor: grab;
            touch-action: none;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        
        .piece:active { cursor: grabbing; }
        .piece.dragging {
            transition: none;
            z-index: 1000;
            opacity: 0.9;
            transform: scale(1.05);
            filter: drop-shadow(0 20px 13px rgba(0,0,0,0.3));
        }

        .piece-block {
            border-radius: 4px;
            box-shadow: var(--piece-shadow);
            border: var(--piece-border);
        }
        .empty-block { background: transparent; border: none; box-shadow: none; }

        /* Кольори фігур (через змінні) */
        .color-0 { background: var(--color-0); }
        .color-1 { background: var(--color-1); }
        .color-2 { background: var(--color-2); }
        .color-3 { background: var(--color-3); }
        .color-4 { background: var(--color-4); }
        .color-5 { background: var(--color-5); }
        .color-6 { background: var(--color-6); }

        /* Контейнер док-станції */
        #dock-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem;
            height: 30vh;
            overflow-y: auto;
        }
        .dock-slot { display: flex; justify-content: center; items-center; min-width: 80px; min-height: 80px; }
        footer { background: var(--dock-bg); backdrop-filter: blur(10px); border-top: 1px solid var(--board-border); }
        header { background: var(--header-bg); }

        /* Анімації */
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes winPulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { box-shadow: 0 0 0 30px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
        .win-anim { animation: winPulse 1.5s infinite; border-color: #4ade80 !important; }

        /* Модальні вікна */
        .modal {
            display: none;
            background: var(--modal-overlay);
            backdrop-filter: blur(5px);
        }
        .modal.active { display: flex; animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content {
            background: var(--modal-bg);
            border: 1px solid var(--board-border);
            color: var(--text-main);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp { to { transform: translateY(0); } }

        /* Заголовок */
        .level-title {
            color: var(--title-color);
            background-image: var(--title-bg);
            -webkit-background-clip: var(--title-bg) != none ? text : unset;
        }

        /* Стилі інпуту */
        .custom-input {
            background: var(--cell-bg);
            border: 2px solid var(--board-border);
            color: var(--text-main);
            outline: none;
        }
        .custom-input:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative select-none">

    <!-- Хедер -->
    <header class="w-full p-3 flex justify-between items-center z-10 shadow-sm transition-colors duration-300">
        <!-- Нікнейм та мова -->
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-2">
            <button id="btn-lang" class="btn-ui font-bold px-3 py-1.5 rounded-lg text-sm">EN/UK</button>
            <div id="player-badge" class="hidden items-center gap-2 px-3 py-1.5 rounded-lg border" style="border-color: var(--board-border); background: var(--cell-bg);">
                <span class="text-sm">👤</span>
                <span id="display-nickname" class="font-bold text-sm truncate max-w-[100px]">Player</span>
            </div>
        </div>
        
        <div class="text-center absolute left-1/2 transform -translate-x-1/2">
            <h1 class="text-xl sm:text-2xl font-extrabold tracking-wider level-title bg-clip-text" data-i18n="level_title">
                Рівень <span id="level-display">1</span>
            </h1>
        </div>

        <div class="flex gap-2">
            <button onclick="openModal('leaderboard-modal')" class="btn-ui p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-500"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            </button>
            <button onclick="openModal('settings-modal')" class="btn-ui p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>
    </header>

    <!-- Ігрове поле -->
    <main class="flex-1 flex flex-col justify-center items-center w-full z-0 px-4 py-2">
        <div id="board-container">
            <div id="board-grid" class="board-grid"></div>
        </div>
    </main>

    <!-- Док-станція -->
    <footer class="w-full z-10 transition-colors duration-300">
        <div id="dock-container"></div>
    </footer>

    <!-- Модальне вікно: Реєстрація (Введення ніка) -->
    <div id="login-modal" class="modal fixed inset-0 z-[100] justify-center items-center">
        <div class="modal-content rounded-2xl p-6 w-80 text-center">
            <h2 class="text-2xl font-bold mb-2" data-i18n="welcome">Вітаємо!</h2>
            <p class="text-muted mb-4 text-sm" data-i18n="enter_name">Придумайте ім'я гравця для збереження прогресу та участі в рейтингу.</p>
            
            <input type="text" id="nickname-input" class="custom-input w-full p-3 rounded-xl mb-2 font-bold text-center" placeholder="Player123" maxlength="15">
            <p id="login-error" class="text-red-500 text-sm h-5 mb-4"></p>

            <button onclick="saveNickname()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition" data-i18n="ready">Готово</button>
        </div>
    </div>

    <!-- Модальне вікно: Налаштування -->
    <div id="settings-modal" class="modal fixed inset-0 z-50 justify-center items-center">
        <div class="modal-content rounded-2xl p-6 w-80">
            <h2 class="text-2xl font-bold mb-6 text-center" data-i18n="settings">Налаштування</h2>
            
            <div class="space-y-4">
                <!-- Звук -->
                <div class="flex justify-between items-center p-3 rounded-lg border" style="border-color: var(--board-border);">
                    <span class="font-semibold" data-i18n="sound">Звук</span>
                    <button id="toggle-sound" class="w-12 h-6 bg-blue-500 rounded-full relative transition-colors">
                        <div id="sound-indicator" class="w-5 h-5 bg-white rounded-full absolute top-0.5 right-0.5 transition-transform"></div>
                    </button>
                </div>

                <!-- Тема -->
                <div class="p-3 rounded-lg border" style="border-color: var(--board-border);">
                    <span class="font-semibold block mb-2" data-i18n="theme">Дизайн</span>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="setTheme('standard')" class="theme-btn btn-ui py-2 px-4 rounded border data-[active=true]:border-blue-500 data-[active=true]:text-blue-500 transition" data-theme-id="standard" data-i18n="theme_std">Стандарт</button>
                        <button onclick="setTheme('light')" class="theme-btn btn-ui py-2 px-4 rounded border data-[active=true]:border-blue-500 data-[active=true]:text-blue-500 transition" data-theme-id="light" data-i18n="theme_light">Світлий мін.</button>
                        <button onclick="setTheme('dark')" class="theme-btn btn-ui py-2 px-4 rounded border data-[active=true]:border-blue-500 data-[active=true]:text-blue-500 transition" data-theme-id="dark" data-i18n="theme_dark">Темний мін.</button>
                    </div>
                </div>
            </div>

            <button onclick="closeModal('settings-modal')" class="mt-6 w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition" data-i18n="close">Закрити</button>
        </div>
    </div>

    <!-- Модальне вікно: Таблиця лідерів -->
    <div id="leaderboard-modal" class="modal fixed inset-0 z-50 justify-center items-center">
        <div class="modal-content rounded-2xl p-6 w-[90%] max-w-md">
            <h2 class="text-2xl font-bold mb-4 text-center" data-i18n="leaderboard">Топ Гравців</h2>
            
            <div class="space-y-2 mb-6 max-h-[50vh] overflow-y-auto pr-2" id="leaderboard-list">
                <!-- Дані генеруються через JS -->
            </div>

            <button onclick="closeModal('leaderboard-modal')" class="w-full py-3 btn-ui border border-[var(--board-border)] rounded-xl font-bold transition" data-i18n="close">Закрити</button>
        </div>
    </div>

    <!-- Модальне вікно: Перемога -->
    <div id="win-modal" class="modal fixed inset-0 z-50 justify-center items-center">
        <div class="modal-content rounded-2xl p-8 w-80 text-center">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-3xl font-extrabold mb-2 text-green-500" data-i18n="win">Рівень Пройдено!</h2>
            <p class="text-muted mb-6" data-i18n="ready_next">Готові до наступного?</p>
            <button onclick="nextLevel()" class="w-full py-3 bg-green-500 hover:bg-green-600 text-white rounded-xl font-bold text-lg shadow-lg shadow-green-500/30 hover:scale-105 transition transform" data-i18n="next_level">Наступний Рівень</button>
        </div>
    </div>

<script>
    // --- ДАНІ ТА СТАН ГРИ ---
    let gameState = {
        nickname: null,
        level: 1,
        bestLevel: 1,
        sound: true,
        lang: 'uk',
        theme: 'standard'
    };

    // Імітація глобальної бази даних лідерів у localStorage
    let globalLeaderboard = [];

    let board = { size: 3, grid: [], cellSize: 0 };
    let currentPieces = [];
    let placedPiecesCount = 0;
    let draggedPiece = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let startDockSlot = null;

    // --- ЛОКАЛІЗАЦІЯ ---
    const dict = {
        uk: {
            level_title: "Рівень", settings: "Налаштування", sound: "Звук", 
            leaderboard: "Топ Гравців", close: "Закрити", win: "Рівень Пройдено!",
            ready_next: "Фігури ідеально зійшлись!", next_level: "Наступний Рівень",
            welcome: "Вітаємо!", enter_name: "Придумайте унікальне ім'я гравця.",
            ready: "Готово", err_empty: "Введіть нікнейм!", err_exists: "Цей нік уже зайнято!",
            theme: "Дизайн", theme_std: "Стандарт (Скло)", theme_light: "Світлий мінімалізм", theme_dark: "Темний мінімалізм"
        },
        en: {
            level_title: "Level", settings: "Settings", sound: "Sound", 
            leaderboard: "Leaderboard", close: "Close", win: "Level Complete!",
            ready_next: "Perfect fit!", next_level: "Next Level",
            welcome: "Welcome!", enter_name: "Create a unique player name.",
            ready: "Ready", err_empty: "Enter a nickname!", err_exists: "Nickname already taken!",
            theme: "Theme", theme_std: "Standard (Glass)", theme_light: "Light Minimal", theme_dark: "Dark Minimal"
        }
    };

    // --- ЗВУК (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (!gameState.sound) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'pickup') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'drop') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'snap') {
            osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.setValueAtTime(800, now + 0.05);
            gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'win') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(500, now + 0.1); osc.frequency.setValueAtTime(800, now + 0.3);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        }
    }

    // --- ІНІЦІАЛІЗАЦІЯ ---
    function init() {
        loadData();
        loadGlobalLeaderboard();
        
        updateLanguageUI();
        updateSoundUI();
        setTheme(gameState.theme);

        window.addEventListener('resize', () => { calculateCellSize(); repositionPiecesOnBoard(); });

        document.getElementById('btn-lang').addEventListener('click', () => {
            gameState.lang = gameState.lang === 'uk' ? 'en' : 'uk';
            saveData(); updateLanguageUI();
        });

        document.getElementById('toggle-sound').addEventListener('click', () => {
            gameState.sound = !gameState.sound;
            saveData(); updateSoundUI();
        });

        if (!gameState.nickname) {
            openModal('login-modal');
        } else {
            showPlayerBadge();
            startLevel();
        }
    }

    // --- РОБОТА З ДАНИМИ ТА ЛІДЕРБОРДОМ ---
    function loadData() {
        const saved = localStorage.getItem('blockPuzzleLocal');
        if (saved) gameState = { ...gameState, ...JSON.parse(saved) };
    }

    function saveData() {
        if (gameState.level > gameState.bestLevel) gameState.bestLevel = gameState.level;
        localStorage.setItem('blockPuzzleLocal', JSON.stringify(gameState));
        updateGlobalLeaderboard();
    }

    function loadGlobalLeaderboard() {
        const db = localStorage.getItem('blockPuzzleDB');
        if (db) {
            globalLeaderboard = JSON.parse(db);
        } else {
            // Фейкові початкові дані
            globalLeaderboard = [
                { name: "MasterMind", level: 12 },
                { name: "PuzzleKing", level: 8 },
                { name: "Noob123", level: 3 }
            ];
            saveGlobalLeaderboard();
        }
    }

    function saveGlobalLeaderboard() {
        localStorage.setItem('blockPuzzleDB', JSON.stringify(globalLeaderboard));
    }

    function updateGlobalLeaderboard() {
        if (!gameState.nickname) return;
        let player = globalLeaderboard.find(p => p.name === gameState.nickname);
        if (player) {
            if (gameState.bestLevel > player.level) player.level = gameState.bestLevel;
        } else {
            globalLeaderboard.push({ name: gameState.nickname, level: gameState.bestLevel });
        }
        saveGlobalLeaderboard();
    }

    // --- ЛОГІКА РЕЄСТРАЦІЇ ---
    function saveNickname() {
        const input = document.getElementById('nickname-input').value.trim();
        const errEl = document.getElementById('login-error');
        const l = dict[gameState.lang];

        if (!input) {
            errEl.innerText = l.err_empty;
            return;
        }

        // Перевірка чи існує нік
        const exists = globalLeaderboard.some(p => p.name.toLowerCase() === input.toLowerCase());
        if (exists) {
            errEl.innerText = l.err_exists;
            return;
        }

        gameState.nickname = input;
        saveData();
        closeModal('login-modal');
        showPlayerBadge();
        startLevel();
    }

    function showPlayerBadge() {
        const badge = document.getElementById('player-badge');
        const nameEl = document.getElementById('display-nickname');
        badge.classList.remove('hidden');
        badge.classList.add('flex');
        nameEl.innerText = gameState.nickname;
    }

    // --- UI ТА ТЕМИ ---
    function setTheme(themeName) {
        gameState.theme = themeName;
        document.documentElement.setAttribute('data-theme', themeName);
        saveData();

        // Оновлення кнопок вибору теми
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.dataset.active = btn.dataset.themeId === themeName ? "true" : "false";
        });
    }

    function updateLanguageUI() {
        const l = dict[gameState.lang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (key === 'level_title') {
                el.innerHTML = ` <span id="level-display"></span>`;
            } else if (l[key]) el.innerText = l[key];
        });
        document.getElementById('nickname-input').placeholder = gameState.lang === 'uk' ? "Гравець123" : "Player123";
        if(document.getElementById('leaderboard-modal').classList.contains('active')) generateLeaderboardUI();
    }

    function updateSoundUI() {
        const btn = document.getElementById('toggle-sound');
        const ind = document.getElementById('sound-indicator');
        if (gameState.sound) {
            btn.classList.replace('bg-gray-500', 'bg-blue-500');
            ind.style.transform = 'translateX(0)'; ind.style.left = 'auto'; ind.style.right = '2px';
        } else {
            btn.classList.replace('bg-blue-500', 'bg-gray-500');
            ind.style.transform = 'translateX(0)'; ind.style.right = 'auto'; ind.style.left = '2px';
        }
    }

    function generateLeaderboardUI() {
        const list = document.getElementById('leaderboard-list');
        const l = dict[gameState.lang];
        
        // Сортуємо
        let sorted = [...globalLeaderboard].sort((a, b) => b.level - a.level);
        
        list.innerHTML = sorted.map((p, i) => {
            const isMe = p.name === gameState.nickname;
            let medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `<span class="text-sm font-bold w-5 inline-block text-center text-muted"></span>`;
            let bgClass = isMe ? 'border border-blue-500 bg-blue-500/10' : 'border border-[var(--board-border)]';
            
            return `
            <div class="flex justify-between items-center p-3 rounded-lg ">
                <div class="flex items-center gap-3">
                    
                    <span class=" ''"></span>
                </div>
                <span class="font-bold"> </span>
            </div>
        `}).join('');
    }

    // --- ЛОГІКА ГРИ (Генерація, Drag&Drop) ---
    function startLevel() {
        placedPiecesCount = 0;
        document.getElementById('board-container').classList.remove('win-anim');
        
        const l = dict[gameState.lang];
        document.querySelector('[data-i18n="level_title"]').innerHTML = ` <span id="level-display"></span>`;
        saveData();

        const sizes = [3, 3, 4, 4, 5, 5, 6, 6, 7, 7, 8];
        board.size = sizes[Math.min(gameState.level - 1, sizes.length - 1)] || 8;
        board.grid = Array(board.size).fill().map(() => Array(board.size).fill(null));

        currentPieces = generatePuzzle(board.size);
        renderBoard();
        renderDock();
        calculateCellSize();
    }

    function generatePuzzle(size) {
        let tempGrid = Array(size).fill().map(() => Array(size).fill(0));
        let pieces = [];
        let pieceId = 1;
        let maxPieceSize = Math.max(3, Math.floor(size * 1.5));
        let minPieceSize = 2;

        while (true) {
            let start = null;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) { if (tempGrid[r][c] === 0) { start = {r, c}; break; } }
                if (start) break;
            }
            if (!start) break;

            let cells = [start];
            tempGrid[start.r][start.c] = pieceId;
            let targetSize = Math.floor(Math.random() * (maxPieceSize - minPieceSize + 1)) + minPieceSize;

            for (let i = 1; i < targetSize; i++) {
                let neighbors = [];
                for (let cell of cells) {
                    const dirs = [[0,1],[1,0],[0,-1],[-1,0]];
                    for (let d of dirs) {
                        let nr = cell.r + d[0], nc = cell.c + d[1];
                        if (nr >= 0 && nr < size && nc >= 0 && nc < size && tempGrid[nr][nc] === 0) {
                            if (!neighbors.some(n => n.r === nr && n.c === nc)) neighbors.push({r: nr, c: nc});
                        }
                    }
                }
                if (neighbors.length === 0) break;
                let nextCell = neighbors[Math.floor(Math.random() * neighbors.length)];
                cells.push(nextCell);
                tempGrid[nextCell.r][nextCell.c] = pieceId;
            }
            pieces.push({ id: pieceId, cells: cells });
            pieceId++;
        }

        return pieces.map((p, index) => {
            let minR = Math.min(...p.cells.map(c => c.r)), minC = Math.min(...p.cells.map(c => c.c));
            let maxR = Math.max(...p.cells.map(c => c.r)), maxC = Math.max(...p.cells.map(c => c.c));
            let rows = maxR - minR + 1, cols = maxC - minC + 1;
            let matrix = Array(rows).fill().map(() => Array(cols).fill(0));
            p.cells.forEach(c => { matrix[c.r - minR][c.c - minC] = 1; });
            return { id: p.id, rows: rows, cols: cols, matrix: matrix, colorClass: `color-` };
        }).sort(() => Math.random() - 0.5);
    }

    function renderBoard() {
        const gridEl = document.getElementById('board-grid');
        gridEl.style.gridTemplateColumns = `repeat(, 1fr)`;
        gridEl.style.gridTemplateRows = `repeat(, 1fr)`;
        gridEl.innerHTML = '';
        for (let r = 0; r < board.size; r++) {
            for (let c = 0; c < board.size; c++) {
                const cell = document.createElement('div');
                cell.className = 'board-cell';
                gridEl.appendChild(cell);
            }
        }
    }

    function renderDock() {
        const dock = document.getElementById('dock-container');
        dock.innerHTML = '';
        currentPieces.forEach(p => {
            const slot = document.createElement('div');
            slot.className = 'dock-slot';
            slot.appendChild(createPieceElement(p));
            dock.appendChild(slot);
        });
    }

    function createPieceElement(pieceData) {
        const el = document.createElement('div');
        el.className = 'piece'; el.dataset.id = pieceData.id; el.dataset.onBoard = "false";
        el.style.gridTemplateColumns = `repeat(, 1fr)`;
        el.style.gridTemplateRows = `repeat(, 1fr)`;
        const miniCellSize = window.innerWidth < 600 ? 20 : 25; // Менші в доці на мобільних
        el.style.width = `px`; el.style.height = `px`;
        el.style.animation = `popIn 0.4s ease-out forwards`; el.style.animationDelay = `s`;

        for (let r = 0; r < pieceData.rows; r++) {
            for (let c = 0; c < pieceData.cols; c++) {
                const block = document.createElement('div');
                block.className = pieceData.matrix[r][c] === 1 ? `piece-block ` : 'empty-block';
                el.appendChild(block);
            }
        }
        el.addEventListener('pointerdown', handlePointerDown);
        return el;
    }

    function calculateCellSize() {
        const boardEl = document.getElementById('board-container');
        board.cellSize = (boardEl.getBoundingClientRect().width - 8) / board.size;
    }

    function repositionPiecesOnBoard() {
        document.querySelectorAll('.piece[data-on-board="true"]').forEach(el => {
            const row = parseInt(el.dataset.boardRow), col = parseInt(el.dataset.boardCol);
            const pieceData = currentPieces.find(p => p.id == el.dataset.id);
            el.style.width = `px`; el.style.height = `px`;
            el.style.left = `px`; el.style.top = `px`;
        });
        
        // Оновлюємо розмір фігур в доці при ресайзі
        document.querySelectorAll('.piece[data-on-board="false"]').forEach(el => {
            const pieceData = currentPieces.find(p => p.id == el.dataset.id);
            const miniCellSize = window.innerWidth < 600 ? 20 : 25;
            el.style.width = `px`; el.style.height = `px`;
        });
    }

    function handlePointerDown(e) {
        if (e.button !== 0 && e.type.includes('mouse')) return;
        draggedPiece = e.currentTarget;
        const pieceData = currentPieces.find(p => p.id == draggedPiece.dataset.id);
        
        if (draggedPiece.dataset.onBoard === "true") {
            for(let r=0; r<pieceData.rows; r++) for(let c=0; c<pieceData.cols; c++) if(pieceData.matrix[r][c]===1) board.grid[parseInt(draggedPiece.dataset.boardRow)+r][parseInt(draggedPiece.dataset.boardCol)+c] = null;
            draggedPiece.dataset.onBoard = "false"; placedPiecesCount--;
        } else startDockSlot = draggedPiece.parentElement;

        playSound('pickup'); calculateCellSize();
        const rect = draggedPiece.getBoundingClientRect();
        
        // Масштабування до розміру поля
        draggedPiece.style.width = `px`;
        draggedPiece.style.height = `px`;
        
        dragOffsetX = e.clientX - rect.left; dragOffsetY = e.clientY - rect.top;
        if (startDockSlot) {
            dragOffsetX = (dragOffsetX / rect.width) * (pieceData.cols * board.cellSize);
            dragOffsetY = (dragOffsetY / rect.height) * (pieceData.rows * board.cellSize);
            
            // Центрування на мобільних щоб палець не закривав фігуру
            if(e.pointerType === 'touch') {
                dragOffsetY += 40; 
            }
        }

        document.body.appendChild(draggedPiece);
        draggedPiece.classList.add('dragging'); draggedPiece.style.position = 'absolute';
        movePiece(e.clientX, e.clientY);
        document.addEventListener('pointermove', handlePointerMove, {passive: false});
        document.addEventListener('pointerup', handlePointerUp);
    }

    function handlePointerMove(e) { if(!draggedPiece) return; e.preventDefault(); movePiece(e.clientX, e.clientY); }
    function movePiece(x, y) { draggedPiece.style.left = `px`; draggedPiece.style.top = `px`; }

    function handlePointerUp(e) {
        if (!draggedPiece) return;
        document.removeEventListener('pointermove', handlePointerMove); document.removeEventListener('pointerup', handlePointerUp);
        draggedPiece.classList.remove('dragging');

        const pieceData = currentPieces.find(p => p.id == draggedPiece.dataset.id);
        const boardRect = document.getElementById('board-grid').getBoundingClientRect();
        const pieceRect = draggedPiece.getBoundingClientRect();
        
        // Точка перевірки (центр першого блоку фігури)
        const relX = pieceRect.left - boardRect.left + (board.cellSize / 2);
        const relY = pieceRect.top - boardRect.top + (board.cellSize / 2);
        const col = Math.floor(relX / board.cellSize), row = Math.floor(relY / board.cellSize);

        let canPlace = true;
        for (let r = 0; r < pieceData.rows; r++) {
            for (let c = 0; c < pieceData.cols; c++) {
                if (pieceData.matrix[r][c] === 1) {
                    let br = row + r, bc = col + c;
                    if (br < 0 || br >= board.size || bc < 0 || bc >= board.size || board.grid[br][bc] !== null) canPlace = false;
                }
            }
        }

        if (canPlace) {
            for (let r = 0; r < pieceData.rows; r++) for (let c = 0; c < pieceData.cols; c++) if (pieceData.matrix[r][c] === 1) board.grid[row + r][col + c] = pieceData.id;
            document.getElementById('board-grid').appendChild(draggedPiece);
            draggedPiece.dataset.onBoard = "true"; draggedPiece.dataset.boardRow = row; draggedPiece.dataset.boardCol = col;
            draggedPiece.style.position = 'absolute'; draggedPiece.style.left = `px`; draggedPiece.style.top = `px`; draggedPiece.style.margin = "0";
            playSound('snap'); placedPiecesCount++;
            
            if (placedPiecesCount === currentPieces.length) {
                setTimeout(() => {
                    playSound('win'); document.getElementById('board-container').classList.add('win-anim');
                    setTimeout(() => openModal('win-modal'), 800);
                }, 200);
            }
        } else {
            playSound('drop'); draggedPiece.dataset.onBoard = "false";
            draggedPiece.style.position = 'relative'; draggedPiece.style.left = 'auto'; draggedPiece.style.top = 'auto';
            const miniCellSize = window.innerWidth < 600 ? 20 : 25;
            draggedPiece.style.width = `px`; draggedPiece.style.height = `px`;
            if (startDockSlot) startDockSlot.appendChild(draggedPiece);
            else {
                let emptySlot = Array.from(document.querySelectorAll('.dock-slot')).find(s => s.children.length === 0);
                if(emptySlot) emptySlot.appendChild(draggedPiece); else document.getElementById('dock-container').appendChild(draggedPiece);
            }
        }
        draggedPiece = null;
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); if(id === 'leaderboard-modal') generateLeaderboardUI(); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); document.getElementById('login-error').innerText = ''; }
    function nextLevel() { closeModal('win-modal'); gameState.level++; startLevel(); }

    window.onload = init;
</script>
